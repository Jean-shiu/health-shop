<style>
  :root{
    --cream:#f6efe1;--cream2:#ece0c9;--ink:#2c3a33;--gold:#c9a44c;--gold-d:#a5822f;

  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Microsoft JhengHei","PingFang TC","Noto Sans TC","Segoe UI",sans-serif;
    color:var(--ink);
    background:

  }
  .wrap{max-width:1120px;margin:0 auto;padding:0 18px 60px;}
  header.hero{text-align:center;padding:48px 16px 26px;}
  .hero .rule{display:flex;align-items:center;justify-content:center;gap:14px;color:var(--gold-d);font-size:1.4rem;}
  .hero .rule::before,.hero .rule::after{content:"";height:1px;width:60px;background:linear-gradient(90deg,transparent,var(--gold));}
  .hero .rule::after{background:linear-gradient(90deg,var(--gold),transparent);}
  .hero h1{font-size:clamp(1.9rem,5vw,2.8rem);margin:14px 0 6px;letter-spacing:.12em;color:var(--green);font-weight:800;}
  .hero .sub{font-size:clamp(.95rem,2.6vw,1.15rem);color:#7a6a48;letter-spacing:.14em;}
  .hero .promo{display:inline-block;margin-top:18px;padding:8px 22px;border-radius:999px;
    background:linear-gradient(135deg,var(--green),var(--green2));color:#f4e9c8;font-weight:700;
    letter-spacing:.1em;font-size:.95rem;box-shadow:0 6px 18px rgba(31,69,54,.28);border:1px solid rgba(201,164,76,.6);}
  nav.jump{position:sticky;top:0;z-index:20;display:flex;flex-wrap:wrap;justify-content:center;gap:8px;
    padding:12px;margin:8px 0 30px;background:rgba(246,239,225,.9);backdrop-filter:blur(6px);
    border-top:1px solid var(--line);border-bottom:1px solid var(--line);}
  nav.jump a{text-decoration:none;font-size:.85rem;color:var(--green);padding:6px 13px;border-radius:999px;
    border:1px solid var(--line);background:#fff;transition:.2s;white-space:nowrap;}
  nav.jump a:hover{background:var(--green);color:#f4e9c8;border-color:var(--green);}
  section{margin-bottom:52px;scroll-margin-top:70px;}
  .banner{position:relative;text-align:center;margin:0 auto 26px;max-width:560px;padding:16px 40px;border-radius:12px;
    background:linear-gradient(135deg,var(--green) 0%,var(--green2) 100%);box-shadow:0 8px 22px rgba(31,69,54,.25);
    border:1px solid rgba(201,164,76,.5);outline:1px solid rgba(201,164,76,.35);outline-offset:5px;}
  .banner h2{margin:0;color:#f6ebca;font-size:clamp(1.15rem,3.4vw,1.5rem);letter-spacing:.08em;font-weight:800;}
  .banner .tag{display:block;margin-top:5px;color:#cbb98a;font-size:.82rem;letter-spacing:.18em;}
  .banner::before,.banner::after{content:"";position:absolute;top:50%;width:22px;height:22px;
    transform:translateY(-50%) rotate(45deg);background:linear-gradient(135deg,var(--green2),var(--green));border:1px solid rgba(201,164,76,.5);}
  .banner::before{left:-11px;}.banner::after{right:-11px;}
  .grid{display:grid;gap:16px;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));}
  .card{display:flex;flex-direction:column;background:#fffdf8;border:1px solid var(--line);border-radius:16px;
    padding:12px 12px 16px;text-align:center;box-shadow:0 3px 10px rgba(120,100,60,.07);
    transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease;}
  .card:hover{transform:translateY(-5px);box-shadow:0 12px 24px rgba(120,100,60,.16);border-color:var(--gold);}
  .imgbox{aspect-ratio:1/1;border-radius:12px;margin-bottom:12px;background:#fff;
    display:flex;align-items:center;justify-content:center;border:1px solid #efe6d2;overflow:hidden;}
  .imgbox img{width:100%;height:100%;object-fit:contain;}
  .imgbox svg{width:62%;height:62%;}
  .name{font-size:.9rem;font-weight:600;color:var(--ink);min-height:3.9em;
    display:flex;align-items:center;justify-content:center;padding:0 2px;}
  .price{margin-top:auto;padding-top:10px;font-size:.85rem;color:#8a7a55;}
  .price b{color:var(--red);font-size:1.15rem;font-weight:800;margin:0 2px;letter-spacing:.02em;}
  .consult{margin-top:40px;text-align:center;padding:34px 20px;border-radius:18px;
    background:linear-gradient(135deg,#f0ead9,#e6dcc2);border:1px solid var(--line);}
  .consult .ico{font-size:2.4rem;}
  .consult h3{margin:8px 0 4px;color:var(--green);letter-spacing:.1em;}
  .consult p{margin:0;color:#7a6a48;font-size:.92rem;}
  footer.foot{text-align:center;color:#9a8b6a;font-size:.78rem;padding:26px 10px 0;letter-spacing:.08em;}
  @media (max-width:520px){
    .grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;}
    .name{font-size:.84rem;min-height:3.6em;}

</style>

function bottle(accent){
  return `<svg viewBox="0 0 100 130" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <rect x="38" y="2" width="24" height="9" rx="3" fill="${accent}" opacity=".85"/>

    <rect x="26" y="23" width="48" height="103" rx="11" fill="${accent}" opacity=".14"/>
    <rect x="26" y="23" width="48" height="103" rx="11" fill="none" stroke="${accent}" stroke-width="2.2" opacity=".45"/>
    <rect x="31" y="50" width="38" height="56" rx="6" fill="#fff"/>
    <rect x="37" y="60" width="26" height="4" rx="2" fill="${accent}" opacity=".55"/>
    <rect x="40" y="70" width="20" height="3" rx="1.5" fill="${accent}" opacity=".3"/>
    <rect x="40" y="77" width="20" height="3" rx="1.5" fill="${accent}" opacity=".3"/>
    <rect x="43" y="90" width="14" height="8" rx="2" fill="${accent}" opacity=".5"/>
  </svg>`;
}

          <div class="price">委任價 <b>${p.price}</b> 元</div>
